<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مدیریت کلمات شخصی - RhythmicAI</title>
    <script src="assets/js/tailwind-browser@4.js"></script>
    <link rel="stylesheet" href="assets/css/Vazir-Code.css" />
    <style>
      body {
        font-family: "Vazir Code", monospace;
      }
      .syllable-input {
        direction: ltr;
        text-align: left;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <nav class="bg-gray-100 border-b border-gray-200 px-4 py-3 flex flex-wrap items-center justify-between">
      <a href="./index.html" class="text-xl font-bold text-gray-800 hover:text-gray-600 transition">
        📚 پروژه متن باز ریتمیک
      </a>

      <div id="navbarNav" class="hidden lg:flex lg:items-center lg:gap-4 w-full lg:w-auto mt-3 lg:mt-0">
        <ul class="flex flex-col lg:flex-row lg:space-x-4 rtl:space-x-reverse space-y-2 lg:space-y-0 w-full">
          <li>
            <a href="./index.html" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-200 font-semibold">تحلیل شعر</a>
          </li>
          <li>
            <a href="./list-words.html" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-200 transition">لیست کلمات</a>
          </li>
          <li>
            <a href="./about.html" class="block px-3 py-2 rounded-md text-gray-700 hover:bg-gray-200 transition">درباره ما</a>
          </li>
          <li>
            <a href="./my-word-list.html" class="block px-3 py-2 rounded-md text-blue-700 bg-blue-100 transition">کلمات من</a>
          </li>
        </ul>
      </div>
      <div class="flex items-center">
        <button
          navbar-toggler
          type="button"
          class="block lg:hidden p-2 rounded-md text-gray-600 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-400"
        >
          ☰
        </button>
        <span class="text-gray-500 text-sm hidden sm:inline">
          تعداد کلمات: <span id="totalWords" class="font-semibold">۰</span>
        </span>
      </div>
    </nav>
    <div class="max-w-4xl mx-auto p-4 md:p-8">
      <header class="mb-8 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-800">
          افزودن کلمه به دیتابیس شخصی
        </h1>
        <button
          onclick="exportJSON()"
          class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 shadow-md"
        >
          📥 خروجی نهایی (JSON)
        </button>
      </header>

      <div class="bg-white p-6 rounded-xl shadow-sm border mb-8">
        <form id="wordForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1">خودِ کلمه:</label>
            <input
              type="text"
              id="wordInput"
              required
              class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1"
              >هجاها (با فاصله جدا کنید):</label
            >
            <input
              type="text"
              id="syllablesInput"
              placeholder="مثلاً: دا غ دا ر"
              required
              class="w-full border rounded-lg p-2 syllable-input outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1"
              >بخش‌ها (با فاصله جدا کنید):</label
            >
            <input
              type="text"
              id="partsInput"
              placeholder="مثلاً: داغ دار"
              class="w-full border rounded-lg p-2 outline-none"
            />
          </div>
          <div class="flex items-end pb-2">
            <label class="flex items-center gap-2 cursor-pointer">
              <input
                type="checkbox"
                id="extendedInput"
                class="w-5 h-5 text-blue-600"
              />
              <span class="text-sm font-semibold">این کلمه «کشیده» است؟</span>
            </label>
          </div>
          <div class="md:col-span-2">
            <button
              type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition"
            >
              افزودن به لیست موقت
            </button>
          </div>
        </form>
      </div>

      <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <table class="w-full text-right border-collapse">
          <thead class="bg-gray-100 border-b">
            <tr>
              <th class="px-4 py-3 text-sm">کلمه</th>
              <th class="px-4 py-3 text-sm">هجاها</th>
              <th class="px-4 py-3 text-sm">بخش‌ها</th>
              <th class="px-4 py-3 text-sm">وضعیت</th>
              <th class="px-4 py-3 text-sm">عملیات</th>
            </tr>
          </thead>
          <tbody id="localWordList"></tbody>
        </table>
      </div>
    </div>

    <script src="./assets/js/custom.mjs" type="module"></script>
    <script type="module" src="./pages/my-word-list.mjs"></script>
  </body>
</html>
